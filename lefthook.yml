# lefthook.yml - Git hooks configuration for wm

config:
  parallel: false
  output:
    - meta           # Print lefthook version
    - summary        # Print summary block
    - empty_summary  # Print summary when no steps to run
    - success        # Print successful steps
    - failure        # Print failed steps
    - skips          # Print "skip" messages

pre-commit:
  commands:
    format:
      glob: "**/*.{c,h}"
      run: make format

    tidy:
      glob: "**/*.{c,h}"
      run: make tidy

pre-push:
  skip: [pre-commit]
  commands:
    format-check:
      run: make format

    tidy:
      glob: "**/*.{c,h}"
      run: make tidy
