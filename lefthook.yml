# lefthook.yml - Git hooks configuration for wm

config:
  parallel: false
  output:
    - meta           # Print lefthook version
    - summary        # Print summary block
    - empty_summary   # Print summary when no steps to run
    - success        # Print successful steps
    - failure        # Print failed steps
    - execution_info # Print `EXECUTE > ...` logging
    - skips          # Print "skip" messages
    # Don't print execution output on success (show only on failure)

pre-commit:
  commands:
    format:
      glob: "**/*.{c,h}"
      run: make format

    tidy:
      glob: "**/*.{c,h}"
      run: make tidy

pre-push:
  skip: [pre-commit]
  commands:
    format-check:
      run: clang-format --dry-run --Werror $(git ls-files | grep -E '\.(c|h)$' | grep -v '^vendor/')