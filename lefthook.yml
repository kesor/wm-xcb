# lefthook.yml - Git hooks configuration for wm

config:
  parallel: false

pre-commit:
  commands:
    format:
      glob: "**/*.{c,h}"
      run: make format

    tidy:
      glob: "**/*.{c,h}"
      run: make tidy

pre-push:
  skip: [pre-commit]
  commands:
    format-check:
      run: clang-format --dry-run --Werror $(git ls-files '*.c' '*.h' | grep -v '^vendor/')

    tidy:
      glob: "**/*.{c,h}"
      run: make tidy