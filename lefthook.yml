# lefthook.yml - Git hooks configuration for wm

pre-commit:
  commands:
    format:
      glob: "**/*.{c,h}"
      run: clang-format --style=file -i {staged_files}
      stage_fixed: true

pre-push:
  skip: [pre-commit]
  commands:
    format:
      glob: "**/*.{c,h}"
      run: clang-format --style=file --dry-run --Werror {push_files}
